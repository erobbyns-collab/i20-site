name: Automated Weekly UK Society Data Update

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-site-update
  cancel-in-progress: false

jobs:
  update-and-deploy:
    name: Fetch data, generate insights, publish
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "requests>=2.31" "openai>=1.30" "matplotlib>=3.8"

      - name: Run weekly data + AI content update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python update_data.py

      - name: Commit and push updated site
        run: |
          git config user.name  "i20-insights-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Check for any changes (index.html and charts/)
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No changes — nothing to publish this week."
            exit 0
          fi

          git add index.html
          git add charts/ --force 2>/dev/null || true

          git commit -m "Automated weekly UK society data update"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
